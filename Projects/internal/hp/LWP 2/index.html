        .bg-deep-gradient {

        .border-accent { border-color: #F59E0B; }

        .bg-grid-pattern {

        @keyframes shine {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        .animate-shine { animation: shine 3s infinite; }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes border-rotate {
            from { transform: rotate(0deg); }

        .rotating-border::before {

            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent 0deg, transparent 270deg, #F59E0B 360deg);
            animation: border-rotate 4s linear infinite;

        .rotating-border {
            position: relative;
            overflow: hidden;

            padding: 3px;
        }
        .rotating-border-content {

            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);

                                                <div className="shrink-0 w-8 h-8 bg-amber-100 text-amber-700 rounded-full flex items-center justify-center font-bold text-sm mt-0.5">A</div>

                        <div className="bg-message-gradient py-24 pt-32">
                            <div className="container mx-auto px-6 relative z-10 max-w-4xl">

                                <p className="text-indigo-100 text-sm md:text-base leading-loose max-w-2xl mx-auto mb-12">
